name: Deploy CFX to GitHub Pages

# build เว็บแล้ว deploy — ทริกเกอร์ตอน push (รวมตอน engine commit ข้อมูลใหม่ → เว็บอัปเดตเอง)
# สมมติ repo root = โฟลเดอร์ meridian-advisor
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps (ไม่มี lock file → npm install)
        run: npm install --no-audit --no-fund
      - name: Build (vite ตรง — esbuild strip types, ไม่ block ที่ type-error · base ./ สำหรับ Pages subpath)
        run: npx vite build --base=./
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
